<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDM Rust — Download Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <div class="header-glow"></div>
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <h1>IDM <span class="accent">Rust</span></h1>
      </div>
      <p class="subtitle">Multi-threaded Download Accelerator</p>
    </header>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-group">
        <label for="url-input" class="input-label">Download URL</label>
        <div class="input-row">
          <input
            type="url"
            id="url-input"
            placeholder="https://example.com/file.zip"
            spellcheck="false"
            autocomplete="off"
          />
        </div>
      </div>
      <div class="input-group input-group-small">
        <label for="connections-input" class="input-label">Connections</label>
        <input
          type="number"
          id="connections-input"
          value="8"
          min="1"
          max="32"
        />
      </div>
      <button id="download-btn" class="btn-download">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download</span>
      </button>
    </section>

    <!-- Progress Section (hidden until download starts) -->
    <section id="progress-section" class="progress-section hidden">
      <div class="progress-header">
        <span id="progress-filename" class="progress-filename">—</span>
        <span id="progress-percent" class="progress-percent">0%</span>
      </div>

      <div class="progress-bar-track">
        <div id="progress-bar-fill" class="progress-bar-fill" style="width: 0%"></div>
        <div class="progress-bar-shimmer"></div>
      </div>

      <div class="stats-row">
        <div class="stat">
          <span class="stat-label">Downloaded</span>
          <span id="stat-downloaded" class="stat-value">0 MB</span>
        </div>
        <div class="stat">
          <span class="stat-label">Total</span>
          <span id="stat-total" class="stat-value">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">Speed</span>
          <span id="stat-speed" class="stat-value">—</span>
        </div>
        <div class="stat">
          <span class="stat-label">ETA</span>
          <span id="stat-eta" class="stat-value">—</span>
        </div>
      </div>

      <!-- Status badge -->
      <div id="status-badge" class="status-badge status-downloading">
        <span id="status-text">Downloading…</span>
      </div>
    </section>

    <!-- Log -->
    <section id="log-section" class="log-section hidden">
      <h3 class="log-title">Event Log</h3>
      <div id="log-entries" class="log-entries"></div>
    </section>
  </div>

  <script src="main.js"></script>
</body>
</html>
